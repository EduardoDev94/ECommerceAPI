version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres-ecommerce:
    image: postgres:16-alpine
    container_name: postgres-ecommerce
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ============================================
  # E-commerce API
  # ============================================
  ecommerce-api:
    build:
      context: .
      dockerfile: ./ECommerceAPI/Dockerfile
    container_name: ecommerce-api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - NewRelic__LicenseKey=${NEW_RELIC_LICENSE_KEY}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres-ecommerce:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openapi/v1.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ecommerce-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # ============================================
  # pgAdmin - Administração do PostgreSQL
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-ecommerce
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres-ecommerce
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ============================================
  # New Relic Infrastructure Agent
  # Monitora host, containers e correlaciona com APM/Logs
  # ============================================
  newrelic-infra:
    image: newrelic/infrastructure:latest
    container_name: newrelic-infra
    network_mode: host
    cap_add:
      - SYS_PTRACE
    privileged: true
    pid: host
    environment:
      - NRIA_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
    volumes:
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
